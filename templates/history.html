<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>История проверок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --accent: #2563eb;
        }

        body {
            margin: 0;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
        }

        .page {
            max-width: 980px;
            margin: 48px auto;
            padding: 0 16px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(16, 24, 40, 0.06);
            padding: 24px;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.4rem, 2vw, 1.9rem);
            letter-spacing: -0.02em;
        }

        .back {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .back:hover {
            text-decoration: underline;
        }

        .chart-wrap {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px;
            background: #fff;
            margin-bottom: 18px;
        }

        .chart {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 520px;
        }

        th, td {
            border-bottom: 1px solid var(--line);
            text-align: left;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        th {
            color: #334155;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .empty {
            color: var(--muted);
            margin: 8px 0 0;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <div class="head">
                <h1>История проверок</h1>
                <a class="back" href="/">Назад</a>
            </div>

            <div class="chart-wrap">
                <img class="chart" src="{{ graph }}" alt="График времени отклика">
            </div>

            {% if rows %}
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Response Time</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in rows %}
                        <tr>
                            <td>{{ r[0] }}</td>
                            <td>{{ r[1] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% else %}
            <p class="empty">Пока нет данных по этому устройству.</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
