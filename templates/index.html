<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --accent: #2563eb;
            --ok: #059669;
            --ok-bg: #d1fae5;
            --down: #dc2626;
            --down-bg: #fee2e2;
        }

        body {
            font-family: "Manrope", sans-serif;
            background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
            color: var(--text);
            min-height: 100vh;
        }

        .page {
            max-width: 1100px;
            margin: 48px auto;
            padding: 0 16px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(16, 24, 40, 0.06);
            overflow: hidden;
        }

        .header {
            padding: 24px 24px 10px;
        }

        .title {
            margin: 0;
            font-size: clamp(1.5rem, 2vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .controls {
            padding: 0 24px 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-scan {
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-scan:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.3);
        }

        .progress-wrap {
            padding: 0 24px 20px;
        }

        .progress {
            height: 12px;
            border-radius: 999px;
            background: #eef2ff;
        }

        .progress-bar {
            border-radius: 999px;
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            font-size: 0.72rem;
            font-weight: 700;
        }

        .table-wrap {
            padding: 0 16px 16px;
            overflow-x: auto;
        }

        .table {
            margin-bottom: 0;
            color: var(--text);
            min-width: 700px;
            border-color: var(--line);
        }

        .table thead th {
            background: #f8fafc;
            border-bottom-width: 1px;
            color: #334155;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .table td,
        .table th {
            vertical-align: middle;
            padding: 0.85rem 0.85rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .status-up {
            color: var(--ok);
            background: var(--ok-bg);
        }

        .status-down {
            color: var(--down);
            background: var(--down-bg);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            color: #0f172a;
        }

        .actions a {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-right: 12px;
            white-space: nowrap;
        }

        .actions a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <header class="header">
                <h1 class="title">Network Monitor</h1>
                <p class="subtitle">Мониторинг устройств, статусов и времени отклика в локальной сети</p>
            </header>

            <div class="controls">
                <button onclick="startScan()" class="btn btn-scan">Сканировать сеть</button>
            </div>

            <div class="progress-wrap">
                <div class="progress">
                    <div id="bar" class="progress-bar" style="width:0%">0%</div>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>IP</th>
                            <th>Status</th>
                            <th>RT</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d, last in data %}
                        <tr>
                            <td>{{ d[1] }}</td>
                            <td><span class="mono">{{ d[2] }}</span></td>
                            <td>
                                {% if last and last[0] %}
                                <span class="status status-up"><span class="dot"></span>Online</span>
                                {% else %}
                                <span class="status status-down"><span class="dot"></span>Offline</span>
                                {% endif %}
                            </td>
                            <td>{{ last[1] if last else "-" }}</td>
                            <td class="actions">
                                <a href="/history/{{ d[0] }}">History</a>
                                <a href="/export/{{ d[0] }}">Export</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
    function startScan() {
        fetch("/scan");
        update();
    }

    function update() {
        fetch("/scan_status")
        .then(r => r.json())
        .then(d => {
            const total = d.total || 1;
            const p = Math.floor((d.progress / total) * 100);
            const bar = document.getElementById("bar");
            bar.style.width = p + "%";
            bar.innerText = p + "%";

            if (d.running) setTimeout(update, 1000);
            else location.reload();
        });
    }
    </script>
</body>
</html>
